<!DOCTYPE html>
<html>
<head>
<title>Reset Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<button class="btn btn-light position-absolute top-0 end-0 m-3" onclick="toggleDarkMode()">🌙</button>

<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-4" style="width:350px;">

<h3 class="text-center mb-3">Reset Password</h3>

<div class="input-group mb-3">
<input type="password" id="newpass" class="form-control" placeholder="New Password">
<button class="btn btn-outline-secondary" onclick="togglePassword('newpass')">
<i class="bi bi-eye"></i>
</button>
</div>

<button class="btn btn-custom w-100">Update</button>

</div>
</div>

<script>
function togglePassword(id){
  let x=document.getElementById(id);
  x.type=x.type==="password"?"text":"password";
}

function toggleDarkMode(){
  document.body.classList.toggle("dark-mode");
}
</script>

</body>
</html>
