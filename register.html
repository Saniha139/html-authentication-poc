<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<button class="btn btn-light position-absolute top-0 end-0 m-3" onclick="toggleDarkMode()">🌙</button>

<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-4" style="width:350px;">

<h3 class="text-center mb-3">Register</h3>

<form onsubmit="return validateRegister()">

<input type="text" class="form-control mb-2" placeholder="Full Name">

<input type="email" id="email" class="form-control mb-2" placeholder="Email">
<div id="emailError" class="text-danger mb-2"></div>

<div class="input-group mb-2">
<input type="password" id="password1" class="form-control" placeholder="Password" onkeyup="checkStrength()">
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password1')">
<i class="bi bi-eye"></i>
</button>
</div>

<small id="strengthText"></small>

<div class="input-group mb-2">
<input type="password" id="password2" class="form-control" placeholder="Confirm Password">
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password2')">
<i class="bi bi-eye"></i>
</button>
</div>

<div id="passError" class="text-danger mb-2"></div>

<button class="btn btn-custom w-100" onclick="showSpinner(this)">Register</button>

</form>

<div class="text-center mt-3">
<a href="index.html">Back to Login</a>
</div>

</div>
</div>

<script>
function togglePassword(id){
  let x=document.getElementById(id);
  x.type=x.type==="password"?"text":"password";
}

function checkStrength(){
  let pwd=document.getElementById("password1").value;
  let text=document.getElementById("strengthText");

  if(pwd.length<4){
    text.innerHTML="Weak ❌";
    text.style.color="red";
  } else if(pwd.length<8){
    text.innerHTML="Medium ⚠️";
    text.style.color="orange";
  } else{
    text.innerHTML="Strong ✅";
    text.style.color="green";
  }
}

function validateRegister(){
  let email=document.getElementById("email").value;
  let p1=document.getElementById("password1").value;
  let p2=document.getElementById("password2").value;

  let emailError=document.getElementById("emailError");
  let passError=document.getElementById("passError");

  emailError.innerHTML="";
  passError.innerHTML="";

  if(!email.includes("@")){
    emailError.innerHTML="Invalid Email!";
    return false;
  }

  if(p1!==p2){
    passError.innerHTML="Passwords do not match!";
    return false;
  }

  return true;
}

function showSpinner(btn){
  btn.innerHTML='<span class="spinner-border spinner-border-sm"></span> Loading...';
}

function toggleDarkMode(){
  document.body.classList.toggle("dark-mode");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
