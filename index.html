<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">

</head>

<body>

<button class="btn btn-light position-absolute top-0 end-0 m-3" onclick="toggleDarkMode()">🌙</button>

<div class="container d-flex justify-content-center align-items-center vh-100">
<div class="card p-4" style="width:350px;">

<h3 class="text-center mb-3">Login</h3>

<form onsubmit="return validateForm()">

<input type="email" id="email" class="form-control mb-2" placeholder="Email">
<div id="emailError" class="text-danger mb-2"></div>

<div class="input-group mb-2">
<input type="password" id="password" class="form-control" placeholder="Password">
<button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password')">
<i class="bi bi-eye"></i>
</button>
</div>

<div id="passError" class="text-danger mb-2"></div>

<button class="btn btn-custom w-100" onclick="showSpinner(this)">Login</button>

</form>

<div class="text-center mt-3">
<a href="forgot-password.html">Forgot Password?</a><br>
<a href="register.html">Create Account</a>
</div>

</div>
</div>

<script>
function togglePassword(id){
  let x=document.getElementById(id);
  x.type=x.type==="password"?"text":"password";
}

function validateForm(){
  let email=document.getElementById("email").value;
  let password=document.getElementById("password").value;

  let emailError=document.getElementById("emailError");
  let passError=document.getElementById("passError");

  emailError.innerHTML="";
  passError.innerHTML="";

  if(!email.includes("@")){
    emailError.innerHTML="Invalid email!";
    return false;
  }

  if(password.length<4){
    passError.innerHTML="Password too short!";
    return false;
  }

  return true;
}

function showSpinner(btn){
  btn.innerHTML='<span class="spinner-border spinner-border-sm"></span> Loading...';
}

function toggleDarkMode(){
  document.body.classList.toggle("dark-mode");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
